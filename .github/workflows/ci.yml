name: CI

# Build + scan on push (and PRs). Runs on GitHub-hosted amd64 runners; the
# image is multi-arch and its security pins are verified to match amd64, so the
# build is representative of the local arm64 one. Reuses the repo's own scripts
# (build.sh / test/smoke-test.sh / test/scan.sh) so CI == local behaviour.

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for gitleaks
      - name: hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
      - name: shellcheck (shell scripts)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck test/*.sh build.sh
      - name: dprint (markdown formatting)
        run: |
          curl -fsSL https://dprint.dev/install.sh | sh -s >/dev/null
          "$HOME/.dprint/bin/dprint" check
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # tags, so build.sh's `git describe` stamps labels
      - name: Build image (OCI labels stamped from git)
        run: ./build.sh docker local/ragu-postgresql:ci
      - name: Smoke test (extensions + round-trips)
        run: IMAGE=local/ragu-postgresql:ci ./test/smoke-test.sh docker
      - name: Install syft + grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh  | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: SBOM + vulnerability scan (.grype.yaml policy)
        run: ./test/scan.sh local/ragu-postgresql:ci docker
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cdx.json
          if-no-files-found: ignore

  # Publish only on v* tags, after lint + build-scan pass. Builds multi-arch
  # (amd64 + arm64 via QEMU), pushes to GHCR, and signs the image with cosign
  # keyless (OIDC — no key to manage). NOTE: the GHCR package may default to
  # private on first push; set it public in the repo's package settings.
  publish:
    needs: [lint, build-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless signing (OIDC)
    env:
      IMAGE: ghcr.io/jrjsmrtn/ragu-postgresql
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Image metadata
        id: meta
        run: |
          {
            echo "version=${GITHUB_REF_NAME#v}"
            echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (amd64 + arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ github.sha }}
            CREATED=${{ steps.meta.outputs.created }}
      - uses: sigstore/cosign-installer@v3
      - name: Sign image (cosign keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
